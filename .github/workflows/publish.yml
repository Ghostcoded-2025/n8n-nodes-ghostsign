# Publishes this n8n community node package to npm on every version tag push.
#
# Auth: NPM_TOKEN repo secret (Classic Automation or granular publish token).
# 404 on publish almost always means the secret is expired — regenerate on npmjs.com
# and update GitHub → Settings → Secrets → NPM_TOKEN.
#
# Alternative: delete NPM_TOKEN and use npm Trusted Publishing (OIDC) — see PUBLISHING.md.

name: Publish

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (must match package.json version)'
        required: true
        default: '0.1.11'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify npm credentials
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is missing. Create an npm Automation token with publish access to n8n-nodes-ghostsign and add it as the NPM_TOKEN Actions secret (see PUBLISHING.md)."
            exit 1
          fi
          npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm config delete always-auth 2>/dev/null || true
          echo "Authenticated as $(npm whoami)"

      - name: Release
        run: npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
