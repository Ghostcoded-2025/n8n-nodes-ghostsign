# Publishes this n8n community node package to npm on every version tag push.
#
# Auth: npm Trusted Publishing (OIDC) via setup-node `registry-url`. Do NOT set a
# stale NPM_TOKEN secret — an invalid token in .npmrc overrides OIDC and yields 404.
# Fallback: valid Automation token — add a Release step env `NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}`
# only if Trusted Publishing is not configured (see PUBLISHING.md).

name: Publish

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (must match package.json version)'
        required: true
        default: '0.1.11'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Release
        run: npm run release
