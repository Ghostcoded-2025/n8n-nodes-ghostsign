# Publishes this n8n community node package to npm on every version tag push.
#
# Auth (pick one):
#   A) npm Trusted Publishing — leave NPM_TOKEN unset; setup-node uses OIDC via registry-url.
#   B) Automation token — set GitHub secret NPM_TOKEN (overrides OIDC in the auth step below).

name: Publish

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (must match package.json version)'
        required: true
        default: '0.1.11'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify npm credentials
        run: |
          npm config delete always-auth 2>/dev/null || true
          if [ -n "$NPM_TOKEN" ]; then
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
            echo "Using NPM_TOKEN secret for authentication."
          else
            echo "NPM_TOKEN not set — using npm Trusted Publishing (OIDC) from setup-node."
          fi
          WHOAMI=$(npm whoami) || {
            echo "::error::npm whoami failed (401/404). Regenerate an npm Automation token, update the NPM_TOKEN Actions secret, or configure npm Trusted Publishing — see PUBLISHING.md."
            exit 1
          }
          echo "Authenticated as $WHOAMI"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release
        run: npm run release
